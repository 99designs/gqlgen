directive @goModel(
    model: String
    models: [String!]
) on OBJECT | INPUT_OBJECT | SCALAR | ENUM | INTERFACE | UNION
directive @goField(
    forceResolver: Boolean
    name: String
    omittable: Boolean
    type: String
) on INPUT_FIELD_DEFINITION | FIELD_DEFINITION
directive @defer(
    if: Boolean = true
    label: String
) on FRAGMENT_SPREAD | INLINE_FRAGMENT
type Query {
    _empty: String
}
