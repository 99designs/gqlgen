schema:
  - "testdata/mixedrequires/schema.graphql"
exec:
  filename: testdata/mixedrequires/generated/exec.go
  package: generated
federation:
  filename: testdata/mixedrequires/generated/federation.go
  package: generated
  version: 2
  options:
    computed_requires: true
model:
  package: model
  filename: testdata/mixedrequires/generated/model/models.go
resolver:
  filename: testdata/mixedrequires/resolver.go
  layout: follow-schema
  dir: testdata/mixedrequires
  package: mixedrequires
omit_complexity: true
call_argument_directives_with_null: true
